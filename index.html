<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>متزعلش مني 🥺❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe5ec;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
            padding: 10px;
        }

        .heart-bg {
            position: absolute;
            color: #ff8fa3;
            animation: float 3s infinite ease-in-out;
            user-select: none;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .main-card {
            background: white;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.4);
            z-index: 10;
            width: 100%;
            max-width: 360px;
            border: 3px solid #ff4d6d;
            position: relative;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .main-card.expanded {
            max-width: 500px;
            padding: 0;
            border-width: 4px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            direction: rtl;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .yes-btn {
            background: #ff4d6d;
            color: white;
        }

        #no-btn {
            background: #ffccd5;
            color: #ff4d6d;
            position: relative;
            z-index: 100;
            /* منع النص من الانقسام لسطرين */
            white-space: nowrap; 
        }

        .drifting-heart {
            position: absolute;
            bottom: -50px;
            color: #ff4d6d;
            animation: driftUp 5s linear infinite;
            z-index: 2;
        }

        @keyframes driftUp {
            to { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .final-image {
            width: 100%;
            height: auto;
            display: block;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>

    <div class="heart-bg" style="top:5%; left:5%; font-size:35px;">❤️</div>
    <div class="heart-bg" style="top:15%; right:10%; font-size:25px;">💖</div>
    <div class="heart-bg" style="top:40%; left:8%; font-size:20px;">💕</div>
    <div class="heart-bg" style="top:60%; right:15%; font-size:30px;">💗</div>
    <div class="heart-bg" style="bottom:10%; left:10%; font-size:28px;">❤️</div>
    <div class="heart-bg" style="bottom:20%; right:5%; font-size:22px;">💕</div>

    <div class="main-card" id="card">
        <h1 id="mainTitle">انتي لسه زعلانة مني ؟</h1>
        <div class="btn-group">
            <button class="yes-btn" onclick="celebrate()">لا</button>
            <button id="no-btn">اه</button>
        </div>
    </div>

    <audio id="sambosaSound" preload="auto">
        <source src="sound.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no-btn');
        const title = document.getElementById('mainTitle');
        const card = document.getElementById('card');
        const audio = document.getElementById('sambosaSound');

        const insults = [
            "أكيد مكنتيش تقصدي؟ 🤔", "يا ساتر على قلبك! 🥺", "بلاش قسوة بقى! 🙂",
            "والله ما كنت أقصد 🥺", "طب بصي في عيني؟ 🙂", "كلمة اه محرمة 🚫🥺",
            "زعلانة كتير؟ 🙂", "قلبك أسود أوي! 🥺", "مش هتلحقي تدوسي 🙂",
            "سامحي يا كبيرة 🥺", "وراكي وراكي 🙂", "في شيكولاتة 🥺",
            "صالحيني بقى 🙂", "صبرك غريب 🥺", "كفاية زعل 🙂",
            "زهقتيني! 🥺", "مش هتعرفي 🙂", "صالحيني يا بنتي 🥺",
            "هانت تستسلمي 🙂", "مفيش اه تاني! 🥺❤️"
        ];

        let count = 0;

        function moveNo() {
            count++;
            if (count >= 20) {
                noBtn.style.display = 'none';
                title.innerText = "خلاص سامحتيني غصب 😂❤️";
                return;
            }

            noBtn.style.position = 'fixed';
            
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const cardRect = card.getBoundingClientRect();

            // هنا السر: هنحدد منطقة الحركة حول الكارت فقط (Offset)
            // بدل ما يروح لآخر الشاشة، ه يتحرك في نطاق 150 بكسل حول الكارت
            const offset = 150; 

            let randomX, randomY;
            let isSafe = false;

            while (!isSafe) {
                // الحركة هتكون قريبة من الكارت مش في الشاشة كلها
                randomX = cardRect.left + (Math.random() - 0.5) * (cardRect.width + offset * 2);
                randomY = cardRect.top + (Math.random() - 0.5) * (cardRect.height + offset * 2);

                // التأكد إن الإحداثيات لسه جوه الشاشة (عشان م يخرجش بره)
                const withinWidth = randomX > 10 && randomX < (window.innerWidth - btnWidth - 10);
                const withinHeight = randomY > 10 && randomY < (window.innerHeight - btnHeight - 10);
                
                // التأكد إنه مش فوق الكارت بالظبط عشان م يغطيش الكلام
                const notOverlapping = !(
                    randomX > cardRect.left - 20 && 
                    randomX < cardRect.right + 20 && 
                    randomY > cardRect.top - 20 && 
                    randomY < cardRect.bottom + 20
                );

                if (withinWidth && withinHeight && notOverlapping) {
                    isSafe = true;
                }
            }

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            title.innerText = insults[count - 1];
        }

        noBtn.addEventListener('mouseover', moveNo);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // منع التمرير (scroll) عند محاولة لمس الزرار
            moveNo();
        });

        function createDriftingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('drifting-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        setInterval(createDriftingHeart, 250);

        function celebrate() {
            audio.currentTime = 0;
            audio.play().catch(() => { console.log("الصوت محتاج تفاعل يدوي"); });

            card.classList.add('expanded');
            card.innerHTML = `<img src="fun.png" class="final-image">`;

            setInterval(createDriftingHeart, 30);
        }
    </script>
</body>
</html>
